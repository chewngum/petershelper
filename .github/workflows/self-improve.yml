name: Daily self-improvement

# Runs once a day (and on demand). Claude reads Peter's wishlist + the codebase
# and edits files to make ONE small improvement; a dedicated step then opens a
# pull request. Merging the PR is how Peter approves; merge auto-deploys via Vercel.

on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC daily
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # required by claude-code-action (OIDC)

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Pull the live wishlist so Claude knows what Peter wants improved, and
      # seed a default PR body that Claude can overwrite with its own summary.
      - name: Gather improvement input
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          echo "# Wishlist (most recent first)" > improvement-input.md
          if [ -n "$APP_URL" ]; then
            curl -fsS "$APP_URL/api/wishlist" \
              | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{for(const w of JSON.parse(s)){console.log('- '+w.body)}}catch{}})" \
              >> improvement-input.md || echo "(could not fetch wishlist)" >> improvement-input.md
          else
            echo "(APP_URL not set — no wishlist available)" >> improvement-input.md
          fi
          cat improvement-input.md
          echo "Automated daily improvement. Review the diff and merge to deploy." > "$RUNNER_TEMP/pr-body.md"

      # Claude edits files only — no git. A later step turns the working-tree
      # changes into a pull request. Bash is restricted so it can build but not
      # touch git.
      - name: Claude makes an improvement
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --max-turns 40
            --model claude-opus-4-8
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(npm:*),Bash(node:*),Bash(ls:*),Bash(cat:*)"
          prompt: |
            You are the daily self-improvement agent for this repository.
            Read CLAUDE.md for the project overview and the rules of the
            self-improvement loop, and read improvement-input.md for Peter's
            wishlist.

            Then:
            1. Choose ONE small, safe, high-value improvement (prefer wishlist items).
            2. Implement it with a small, focused diff by editing files.
            3. Run `npm run build` and fix any errors until it passes.
            4. Write a short markdown summary (what you changed and why) to the
               file ${{ runner.temp }}/pr-body.md using the Write tool, overwriting it.

            Do NOT use git, and do NOT commit — just leave your edits in the
            working tree. A later step opens the pull request. Do not delete
            features or user data. If nothing is worth changing, make no edits.

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: improve/run-${{ github.run_number }}
          delete-branch: true
          title: "Daily improvement #${{ github.run_number }}"
          commit-message: "Daily self-improvement #${{ github.run_number }}"
          body-path: ${{ runner.temp }}/pr-body.md
